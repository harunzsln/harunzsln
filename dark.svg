    .muted-text { fill: #94A3B8; }
    .section-label { fill: #64748B; font-size: 11px; letter-spacing: 2px; font-weight: 700; }
    .pill-bg { fill: #101A2E; }
    .pill-border { fill: none; stroke: rgba(124,58,237,.35); stroke-width: 1; }
    .pill-text { fill: #F8FAFC; font-size: 12px; font-weight: 600; }
    .pill { transition: transform .2s ease; transform-box: fill-box; transform-origin: center; }
    .pill:hover { }
    .cursor { fill: #22D3EE; }
    .dot-red { fill: #FF5F56; }
    .dot-yellow { fill: #FFBD2E; }
    .dot-green { fill: #27C93F; }
    .icon-stroke { stroke: #F8FAFC; fill: none; stroke-width: 1.4; }
    .icon-fill { fill: #94A3B8; }
    .social-label { fill: #64748B; font-size: 9.5px; }
    ]]>
